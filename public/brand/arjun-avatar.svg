<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Vajra Acharya">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5339"/>
      <stop offset="1" stop-color="#1F3B27"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#C5A53B" stroke-width="4"/>
  <!-- Stylised sprout mark -->
  <g stroke="#C5A53B" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M60 150 Q100 120 140 150"/>
    <path d="M70 140 Q100 115 130 140"/>
  </g>
  <!-- Monogram A -->
  <text x="100" y="118" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="110" font-weight="400" font-style="italic"
        fill="#F5F0EB">A</text>
  <!-- Sanskrit/Devanagari -->
  <text x="100" y="170" text-anchor="middle"
        font-family="'Noto Sans Devanagari', serif"
        font-size="14" font-weight="500"
        fill="#C5A53B" letter-spacing="2">Vajra Acharya</text>
</svg>




